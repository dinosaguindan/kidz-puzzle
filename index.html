<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Truck Puzzle Game</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0f172a;
  color:white;

  display:flex;
  flex-direction:column;
  align-items:center;

  padding:0px;
}

h1{
  margin-bottom:20px;
}

.game{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
  padding-left:10px;
}

/* BOARD */

.board{
  width:450px;
  height:450px;

  display:grid;
  grid-template-columns:repeat(3, 1fr);
  grid-template-rows:repeat(3, 1fr);

  position:relative;

  border:4px solid white;
  overflow:hidden;
  margin-top:10px;
}

/* GUIDE IMAGE */

.board::before{
  content:"";

  position:absolute;
  inset:0;

  background-image:url('./trucks/Kamaz-PNG-Clipart.png');

  background-size:450px 450px;
  background-position:center;

  opacity:0.4;
  /*filter:blur(2px);*/

  z-index:0;

}

/* SLOTS */

.slot{
  border:1px solid rgba(255,255,255,0.2);

  position:relative;
  z-index:1;
}

/* PIECES AREA */

.pieces{
  width:500px;
  min-height:450px;

  background:#111827;

  border-radius:15px;

  padding:15px;

  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-content:flex-start;
  justify-content:center;
  padding-top:0px;
}

/* PIECES */

.piece{
  width:150px;
  height:150px;

  border:2px solid white;

  cursor:grab;

  background-image:url('./trucks/Kamaz-PNG-Clipart.png');

  background-size:450px 450px;

  transition:0.2s;
  touch-action: none; /* IMPORTANT for mobile */
}

.piece:hover{
  transform:scale(1.03);
}

.piece:active{
  cursor:grabbing;
}

.correct{
  border:3px solid #22c55e;
}

/* MESSAGE */

.message{
  margin-top:20px;
  font-size:28px;
  color:#4ade80;
  font-weight:bold;
}

</style>
</head>

<body>

<h1>🚒 Truck Puzzle Game</h1>

<div class="game">

  <!-- PUZZLE BOARD -->

  <div class="board" id="board">

    <div class="slot" data-index="0"></div>
    <div class="slot" data-index="1"></div>
    <div class="slot" data-index="2"></div>

    <div class="slot" data-index="3"></div>
    <div class="slot" data-index="4"></div>
    <div class="slot" data-index="5"></div>

    <div class="slot" data-index="6"></div>
    <div class="slot" data-index="7"></div>
    <div class="slot" data-index="8"></div>

  </div>

  <!-- PIECES -->

  <div class="pieces" id="pieces"></div>

</div>

<div class="message" id="message"></div>

<script>

const piecesContainer = document.getElementById('pieces');
const slots = document.querySelectorAll('.slot');
const message = document.getElementById('message');

let draggedPiece = null;
let completed = 0;

/* IMAGE SETTINGS */

const BOARD_SIZE = 450;
const GRID_SIZE = 3;
const PIECE_SIZE = BOARD_SIZE / GRID_SIZE;

/* CREATE PIECES */

const puzzlePieces = [];

for(let i = 0; i < 9; i++){

  const piece = document.createElement('div');

  piece.classList.add('piece');

  piece.setAttribute('draggable', true);

  piece.dataset.index = i;

  /* CORRECT IMAGE POSITION */

  const x = (i % GRID_SIZE) * PIECE_SIZE;
  const y = Math.floor(i / GRID_SIZE) * PIECE_SIZE;

  piece.style.backgroundPosition =
    `-${x}px -${y}px`;

  puzzlePieces.push(piece);

}

/* SHUFFLE */

puzzlePieces.sort(() => Math.random() - 0.5);

/* ADD PIECES */

puzzlePieces.forEach(piece => {

  piecesContainer.appendChild(piece);

  piece.addEventListener('dragstart', () => {

    draggedPiece = piece;

  });

});

/* SLOT EVENTS */

slots.forEach(slot => {

  slot.addEventListener('dragover', e => {

    e.preventDefault();

  });

  slot.addEventListener('drop', () => {

    if(!draggedPiece) return;

    if(slot.children.length > 0) return;

    const slotIndex = slot.dataset.index;
    const pieceIndex = draggedPiece.dataset.index;

    /* CORRECT PIECE */

    if(slotIndex === pieceIndex){

      slot.appendChild(draggedPiece);

      /* KEEP EXACT SIZE */

      draggedPiece.style.width = '100%';
      draggedPiece.style.height = '100%';

      draggedPiece.style.margin = '0';

      draggedPiece.style.backgroundSize =
        `${BOARD_SIZE}px ${BOARD_SIZE}px`;

      slot.classList.add('correct');

      draggedPiece.draggable = false;

      completed++;

      if(completed === 9){

        message.innerHTML =
          '🎉 Puzzle Completed!';

      }

    }else{

      alert('Wrong piece!');

    }

  });

});

</script>

</body>
</html>
