<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truck Puzzle Game</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{ margin:20px; }

.game{
  display:flex;
  gap:20px;
  justify-content:center;
}

/* BOARD */
.board{
  width:450px;
  height:450px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  position:relative;
  border:4px solid white;
}

/* GUIDE */
.board::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('./trucks/Kamaz-PNG-Clipart.png');
  background-size:450px 450px;
  opacity:0.4;
}

/* SLOT */
.slot{
  border:1px solid rgba(255,255,255,0.2);
  position:relative;
}

/* PIECES */
.pieces{
  width:500px;
  min-height:450px;
  background:#111827;
  padding:15px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.piece{
  width:150px;
  height:150px;
  background-image:url('./trucks/Kamaz-PNG-Clipart.png');
  background-size:450px 450px;
  border:2px solid white;
  touch-action:none;
  cursor:grab;
}

.message{
  margin-top:20px;
  font-size:24px;
  color:#4ade80;
}

.correct{
  border:3px solid #22c55e;
}

</style>
</head>

<body>

<h1>🚒 Truck Puzzle Game</h1>

<div class="game">

  <div class="board" id="board">
    <div class="slot" data-index="0"></div>
    <div class="slot" data-index="1"></div>
    <div class="slot" data-index="2"></div>
    <div class="slot" data-index="3"></div>
    <div class="slot" data-index="4"></div>
    <div class="slot" data-index="5"></div>
    <div class="slot" data-index="6"></div>
    <div class="slot" data-index="7"></div>
    <div class="slot" data-index="8"></div>
  </div>

  <div class="pieces" id="pieces"></div>

</div>

<div class="message" id="message"></div>

<script>

const piecesContainer = document.getElementById("pieces");
const slots = document.querySelectorAll(".slot");
const message = document.getElementById("message");
const board = document.getElementById("board");

const GRID = 3;
const SIZE = 450 / GRID;

let dragged = null;
let offsetX = 0;
let offsetY = 0;
let completed = 0;

/* CREATE PIECES */
const pieces = [];

for(let i=0;i<9;i++){

  const div = document.createElement("div");
  div.classList.add("piece");
  div.dataset.index = i;

  const x = (i % GRID) * SIZE;
  const y = Math.floor(i / GRID) * SIZE;

  div.style.backgroundPosition = `-${x}px -${y}px`;

  pieces.push(div);
}

/* shuffle */
pieces.sort(() => Math.random() - 0.5);

pieces.forEach(p => {
  piecesContainer.appendChild(p);

  /* START DRAG */
  p.addEventListener("pointerdown", (e) => {

    dragged = p;

    const rect = p.getBoundingClientRect();

    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    document.body.appendChild(p);
    p.style.position = "absolute";
    p.style.zIndex = 1000;
  });
});

/* MOVE */
document.addEventListener("pointermove", (e) => {

  if(!dragged) return;

  dragged.style.left = (e.clientX - offsetX) + "px";
  dragged.style.top = (e.clientY - offsetY) + "px";
});

/* DROP (FIXED LOGIC) */
document.addEventListener("pointerup", (e) => {

  if(!dragged) return;

  const boardRect = board.getBoundingClientRect();

  const x = e.clientX;
  const y = e.clientY;

  let placed = false;

  slots.forEach(slot => {

    const rect = slot.getBoundingClientRect();

    const isInside =
      x > rect.left &&
      x < rect.right &&
      y > rect.top &&
      y < rect.bottom;

    if(isInside){

      const slotIndex = slot.dataset.index;
      const pieceIndex = dragged.dataset.index;

      if(slotIndex === pieceIndex){

        slot.appendChild(dragged);

        dragged.style.position = "relative";
        dragged.style.left = "0";
        dragged.style.top = "0";
        dragged.style.width = "100%";
        dragged.style.height = "100%";

        slot.classList.add("correct");

        completed++;

        if(completed === 9){
          message.innerHTML = "🎉 Puzzle Completed!";
        }

      } else {
        piecesContainer.appendChild(dragged);
        resetPiece();
      }

      placed = true;
    }

  });

  if(!placed){
    piecesContainer.appendChild(dragged);
    resetPiece();
  }

  dragged = null;

});

function resetPiece(){
  dragged.style.position = "relative";
  dragged.style.left = "0";
  dragged.style.top = "0";
}

</script>

</body>
</html>
